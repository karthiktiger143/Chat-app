<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain:
"nammaapp-e8b13.firebaseapp.com",

projectId:
"nammaapp-e8b13",

storageBucket:
"nammaapp-e8b13.firebasestorage.app",

messagingSenderId:
"1068448599469",

appId:
"1:1068448599469:web:8f02d17e456597de75e524",

measurementId:
"G-ZGL72NLPVS"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* LOAD GROUPS */

async function loadGroups(){

const querySnapshot =
await getDocs(
collection(db, "groups")
);

const groupList =
document.querySelector(".group-list");

groupList.innerHTML = "";

querySnapshot.forEach((doc)=>{

const data =
doc.data();

groupList.innerHTML += `

<div
class="group"
onclick="window.location.href='group.html'"
>

<div class="group-left">

<div class="group-icon">
${data.emoji}
</div>

<div>

<div class="group-name">
${data.name}
</div>

<div class="group-status">
${data.online} Members Online
</div>

</div>

</div>

<div class="group-right">

<div class="members">
${data.seats} / 8
</div>

<div class="live">
LIVE
</div>

</div>

</div>

`;

});

}

loadGroups();

</script>
