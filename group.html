<!DOCTYPE html>
<html>
<head>

<title>NammaApp Group</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* TOPBAR */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
z-index:1000;
border-bottom:1px solid #222;
}

.room-name{
font-size:20px;
font-weight:bold;
}

.online{
font-size:13px;
color:#00ff66;
margin-top:4px;
}

.admin-btn{
background:#0084ff;
padding:10px 15px;
border:none;
border-radius:12px;
color:white;
}

/* SEATS */

.seats{
padding-top:100px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding-left:20px;
padding-right:20px;
}

.seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
position:relative;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.user{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.mic{
margin-top:6px;
color:#00ff66;
}

.crown{
position:absolute;
top:10px;
right:10px;
font-size:22px;
}

/* COMMENTS */

.comment-area{
height:180px;
overflow-y:auto;
padding:15px;
margin-top:20px;
margin-bottom:120px;
}

.comment{
background:#111;
padding:12px;
border-radius:15px;
margin-top:10px;
}

.comment b{
color:#00aaff;
}

/* SEND BOX */

.send-box{
width:100%;
position:fixed;
bottom:0;
left:0;
background:#111;
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
}

.send-box button{
padding:14px 18px;
border:none;
border-radius:15px;
background:#0084ff;
color:white;
font-size:18px;
}

.emoji{
font-size:24px;
cursor:pointer;
}

.gift{
font-size:24px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div>

<div class="room-name">
🔥 Tamil Friends Room
</div>

<div class="online">
8 Members Online
</div>

</div>

<button class="admin-btn">
Admin
</button>

</div>

<!-- SEATS -->

<div class="seats">

<div class="seat">

<div class="crown">
👑
</div>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="user">
Karthi
</div>

<div class="mic">
🎤 Speaking
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="user">
Arun
</div>

<div class="mic">
🎧 Listening
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="user">
Vicky
</div>

<div class="mic">
🎤 Speaking
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="user">
Hari
</div>

<div class="mic">
🎧 Listening
</div>

</div>

</div>

<!-- COMMENTS -->

<div
class="comment-area"
id="commentArea"
>

<div class="comment">
<b>Karthi :</b> Hello Guys 👋
</div>

<div class="comment">
<b>Arun :</b> Welcome 🔥
</div>

</div>

<!-- SEND BOX -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<div
class="gift"
onclick="sendGift()"
>
🎁
</div>

<input
type="text"
id="msg"
placeholder="Write comment..."
>

<button onclick="sendMsg()">
➤
</button>

</div>

<script>

/* SEND COMMENT */

function sendMsg(){

let text =
document.getElementById("msg").value;

if(text.trim() == ""){
return;
}

let user =
localStorage.getItem("username");

let div =
document.createElement("div");

div.className =
"comment";

div.innerHTML =

"<b>" +
user +
" :</b> " +
text;

document.getElementById(
"commentArea"
).appendChild(div);

document.getElementById(
"msg"
).value = "";

scrollBottom();

}

/* EMOJI */

function addEmoji(){

document.getElementById(
"msg"
).value += "😊";

}

/* GIFT */

function sendGift(){

let user =
localStorage.getItem("username");

let div =
document.createElement("div");

div.className =
"comment";

div.innerHTML =

"<b>" +
user +
"</b> sent a gift 🎁";

document.getElementById(
"commentArea"
).appendChild(div);

scrollBottom();

}

/* AUTO SCROLL */

function scrollBottom(){

let box =
document.getElementById(
"commentArea"
);

box.scrollTop =
box.scrollHeight;

}

</script>

</body>
</html>
