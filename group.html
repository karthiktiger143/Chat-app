<!DOCTYPE html>
<html>
<head>

<title>Group Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
}

/* TOP */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.room-info{
display:flex;
flex-direction:column;
}

.room-name{
font-size:20px;
font-weight:bold;
}

.room-online{
font-size:13px;
color:#00ff66;
margin-top:3px;
}

.admin-btn{
background:#0084ff;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
}

/* SEATS */

.seats{
padding-top:90px;
padding-left:15px;
padding-right:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
position:relative;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.username{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.status{
margin-top:5px;
font-size:14px;
color:#00ff66;
}

.crown{
position:absolute;
top:10px;
right:10px;
font-size:22px;
}

/* COMMENTS */

.comment-area{
padding:15px;
margin-bottom:90px;
}

.comment{
background:#111;
padding:12px;
border-radius:15px;
margin-top:10px;
font-size:15px;
}

/* BOTTOM */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
gap:10px;
padding:10px;
align-items:center;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
}

.send-btn{
background:#0084ff;
border:none;
padding:14px 18px;
border-radius:15px;
color:white;
font-size:18px;
}

.emoji,
.gift{
font-size:24px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="room-info">

<div class="room-name">
🔥 Tirunelveli Room
</div>

<div class="room-online">
8 Members Online
</div>

</div>

<button class="admin-btn">
Admin
</button>

</div>

<!-- SEATS -->

<div class="seats">

<div class="seat">

<div class="crown">
👑
</div>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Karthi
</div>

<div class="status">
🎤 Speaking
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Arun
</div>

<div class="status">
🎧 Listening
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Hari
</div>

<div class="status">
🎧 Listening
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Vicky
</div>

<div class="status">
🎤 Speaking
</div>

</div>

</div>

<!-- COMMENTS -->

<div
class="comment-area"
id="commentArea"
>

<div class="comment">
Karthi : Hello Guys 👋
</div>

<div class="comment">
Arun : Welcome 🔥
</div>

</div>

<!-- SEND BOX -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<div
class="gift"
onclick="sendGift()"
>
🎁
</div>

<input
type="text"
id="msg"
placeholder="Write comment..."
>

<button
class="send-btn"
onclick="sendMsg()"
>
➤
</button>

</div>

<script>

function sendMsg(){

let msg =
document.getElementById(
"msg"
).value;

if(msg == ""){
return;
}

let user =
localStorage.getItem(
"username"
);

let div =
document.createElement(
"div"
);

div.className =
"comment";

div.innerHTML =
user + " : " + msg;

document.getElementById(
"commentArea"
).appendChild(div);

document.getElementById(
"msg"
).value = "";

}

function addEmoji(){

document.getElementById(
"msg"
).value += "😊";

}

function sendGift(){

let user =
localStorage.getItem(
"username"
);

let div =
document.createElement(
"div"
);

div.className =
"comment";

div.innerHTML =
user + " sent gift 🎁";

document.getElementById(
"commentArea"
).appendChild(div);

}

</script>

</body>
</html>
