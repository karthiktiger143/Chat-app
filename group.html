<!DOCTYPE html>
<html>
<head>

<title>Group Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
}

/* TOPBAR */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.room-info{
display:flex;
flex-direction:column;
}

.room-name{
font-size:20px;
font-weight:bold;
}

.room-online{
font-size:13px;
color:#00ff66;
margin-top:3px;
}

.admin-btn{
background:#0084ff;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
font-size:14px;
}

/* SEATS */

.seats{
padding-top:90px;
padding-left:15px;
padding-right:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
position:relative;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.username{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.status{
margin-top:5px;
font-size:14px;
color:#00ff66;
}

.crown{
position:absolute;
top:10px;
right:10px;
font-size:22px;
}

/* EMPTY SEAT */

.empty-seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
border:2px dashed #333;
cursor:pointer;
}

.plus{
font-size:40px;
margin-top:15px;
}

.join-text{
margin-top:10px;
font-size:16px;
color:#aaa;
}

/* COMMENTS */

.comment-area{
padding:15px;
margin-bottom:100px;
}

.comment{
background:#111;
padding:12px;
border-radius:15px;
margin-top:10px;
font-size:15px;
}

/* SEND BOX */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
gap:10px;
padding:10px;
align-items:center;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
}

.send-btn{
background:#0084ff;
border:none;
padding:14px 18px;
border-radius:15px;
color:white;
font-size:18px;
}

.emoji,
.gift{
font-size:24px;
cursor:pointer;
}

/* PROFILE POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
width:90%;
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
}

.popup-box img{
width:90px;
height:90px;
border-radius:50%;
}

.popup-name{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.popup-btn{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#0084ff;
color:white;
font-size:16px;
}

.close-btn{
background:red;
margin-top:10px;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="room-info">

<div class="room-name">
🔥 Tirunelveli Room
</div>

<div class="room-online">
8 Members Online
</div>

</div>

<button class="admin-btn">
Admin
</button>

</div>

<!-- SEATS -->

<div class="seats">

<!-- USER 1 -->

<div
class="seat"
onclick="openProfile('Karthi')"
>

<div class="crown">
👑
</div>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Karthi
</div>

<div class="status">
🎤 Speaking
</div>

</div>

<!-- USER 2 -->

<div
class="seat"
onclick="openProfile('Arun')"
>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Arun
</div>

<div class="status">
🎧 Listening
</div>

</div>

<!-- USER 3 -->

<div
class="seat"
onclick="openProfile('Hari')"
>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Hari
</div>

<div class="status">
🎧 Listening
</div>

</div>

<!-- USER 4 -->

<div
class="seat"
onclick="openProfile('Vicky')"
>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Vicky
</div>

<div class="status">
🎤 Speaking
</div>

</div>

<!-- EMPTY SEAT -->

<div
class="empty-seat"
onclick="joinSeat()"
>

<div class="plus">
+
</div>

<div class="join-text">
Join Seat
</div>

</div>

<!-- EMPTY SEAT -->

<div
class="empty-seat"
onclick="joinSeat()"
>

<div class="plus">
+
</div>

<div class="join-text">
Join Seat
</div>

</div>

</div>

<!-- COMMENTS -->

<div
class="comment-area"
id="commentArea"
>

<div class="comment">
Karthi : Hello Guys 👋
</div>

<div class="comment">
Arun : Welcome 🔥
</div>

</div>

<!-- SEND BOX -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<div
class="gift"
onclick="sendGift()"
>
🎁
</div>

<input
type="text"
id="msg"
placeholder="Write comment..."
>

<button
class="send-btn"
onclick="sendMsg()"
>
➤
</button>

</div>

<!-- PROFILE POPUP -->

<div
class="popup"
id="popup"
>

<div class="popup-box">

<img src="https://i.imgur.com/6VBx3io.png">

<div
class="popup-name"
id="popupName"
>
User
</div>

<button
class="popup-btn"
onclick="sendRequest()"
>
Send Message Request
</button>

<button
class="popup-btn"
onclick="followUser()"
>
Follow User
</button>

<button
class="popup-btn close-btn"
onclick="closePopup()"
>
Close
</button>

</div>

</div>

<script>

/* SEND COMMENT */

function sendMsg(){

let msg =
document.getElementById(
"msg"
).value;

if(msg == ""){
return;
}

let user =
localStorage.getItem(
"username"
);

let div =
document.createElement(
"div"
);

div.className =
"comment";

div.innerHTML =
user + " : " + msg;

document.getElementById(
"commentArea"
).appendChild(div);

document.getElementById(
"msg"
).value = "";

}

/* ADD EMOJI */

function addEmoji(){

document.getElementById(
"msg"
).value += " 😊";

}

/* SEND GIFT */

function sendGift(){

let user =
localStorage.getItem(
"username"
);

let div =
document.createElement(
"div"
);

div.className =
"comment";

div.innerHTML =
user + " sent gift 🎁";

document.getElementById(
"commentArea"
).appendChild(div);

}

/* JOIN SEAT */

function joinSeat(){

alert(
"You joined speaker seat 🔥"
);

}

/* PROFILE POPUP */

function openProfile(name){

document.getElementById(
"popup"
).style.display = "flex";

document.getElementById(
"popupName"
).innerHTML = name;

}

function closePopup(){

document.getElementById(
"popup"
).style.display = "none";

}

/* REQUEST */

function sendRequest(){

alert(
"Message request sent 🔥"
);

}

/* FOLLOW */

function followUser(){

alert(
"User followed 🔥"
);

}

</script>

</body>
</html>
