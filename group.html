<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Group Room</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
padding-bottom:120px;
}

/* TOPBAR */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.left-top{
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
font-size:24px;
cursor:pointer;
}

.room-info{
display:flex;
flex-direction:column;
}

.room-name{
font-size:20px;
font-weight:bold;
}

.room-online{
font-size:13px;
color:#00ff66;
margin-top:3px;
}

.admin-btn{
background:#0084ff;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
font-size:14px;
cursor:pointer;
}

/* ROOM DETAILS */

.link-box{
padding:90px 15px 0px;
}

.room-link{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
font-size:14px;
border:1px solid #222;
}

/* VOICE */

.voice-controls{
position:fixed;
top:170px;
right:15px;
display:flex;
flex-direction:column;
gap:10px;
z-index:9999;
}

.voice-btn{
width:60px;
height:60px;
border:none;
border-radius:50%;
font-size:24px;
color:white;
cursor:pointer;
}

.mic-btn{
background:#0084ff;
}

.speaker-btn{
background:#00aa55;
}

/* SEATS */

.seats{
padding-top:20px;
padding-left:15px;
padding-right:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.username{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.status{
margin-top:5px;
font-size:14px;
color:#00ff66;
}

.empty-seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
border:2px dashed #333;
}

.plus{
font-size:40px;
margin-top:15px;
}

.join-text{
margin-top:10px;
font-size:16px;
color:#aaa;
}

/* COMMENTS */

.comment-area{
padding:15px;
margin-bottom:120px;
}

.comment{
background:#111;
padding:12px;
border-radius:15px;
margin-top:10px;
font-size:15px;
}

/* SEND */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
gap:10px;
padding:10px;
align-items:center;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
background:#222;
color:white;
}

.send-btn{
background:#0084ff;
border:none;
padding:14px 18px;
border-radius:15px;
color:white;
font-size:18px;
cursor:pointer;
}

.emoji{
font-size:24px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="left-top">

<div
class="back-btn"
onclick="history.back()"
>
⬅
</div>

<div class="room-info">

<div
class="room-name"
id="roomName"
>
🔥 Voice Room
</div>

<div
class="room-online"
id="onlineText"
>
🟢 0 Members Online
</div>

</div>

</div>

<button
class="admin-btn"
onclick="location.href='admin.html'"
>
Admin
</button>

</div>

<!-- GROUP DETAILS -->

<div class="link-box">

<div
class="room-link"
id="roomLink"
>
Loading...
</div>

</div>

<!-- VOICE -->

<div class="voice-controls">

<button
id="micBtn"
class="voice-btn mic-btn"
onclick="toggleMic()"
>
🎤
</button>

<button
id="speakerBtn"
class="voice-btn speaker-btn"
onclick="toggleSpeaker()"
>
🔊
</button>

</div>

<!-- USERS -->

<div
class="seats"
id="seatBox"
>
</div>

<!-- COMMENTS -->

<div
class="comment-area"
id="commentArea"
>

<div class="comment">
🔥 Welcome To Tamil Voice Room
</div>

</div>

<!-- SEND -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<input
type="text"
id="msg"
placeholder="Write comment..."
>

<button
class="send-btn"
onclick="sendMsg()"
>
➤
</button>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
deleteDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain:
"nammaapp-e8b13.firebaseapp.com",

projectId:
"nammaapp-e8b13",

storageBucket:
"nammaapp-e8b13.firebasestorage.app",

messagingSenderId:
"1068448599469",

appId:
"1:1068448599469:web:8f02d17e456597de75e524"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* USER */

const username =
localStorage.getItem(
"username"
)
||
"Guest";

/* ROOM ID */

let roomId =
localStorage.getItem(
"roomId"
);

/* GET GROUP */

const groupRef =
doc(
db,
"groups",
roomId
);

const groupSnap =
await getDoc(groupRef);

let groupData = {};

if(groupSnap.exists()){

groupData =
groupSnap.data();

}

/* GROUP DETAILS */

let groupName =
groupData.groupName
||
"Tamil Voice Room";

let groupType =
groupData.groupType
||
"Public";

let ownerName =
groupData.ownerName
||
"Guest";

/* SHOW DETAILS */

document.getElementById(
"roomName"
).innerHTML =
"🔥 " + groupName;

document.getElementById(
"roomLink"
).innerHTML =
"👑 Owner : "
+
ownerName
+
" | 🔒 "
+
groupType;

/* JOIN ROOM */

const joinRef =
await addDoc(
collection(db,"roomUsers"),
{
room:roomId,
name:username,
time:Date.now()
}
);

/* REMOVE USER */

window.addEventListener(
"beforeunload",
async()=>{

await deleteDoc(
doc(
db,
"roomUsers",
joinRef.id
)
);

});

/* USERS */

const seatBox =
document.getElementById(
"seatBox"
);

const userQuery =
query(
collection(db,"roomUsers"),
orderBy("time")
);

onSnapshot(
userQuery,
(snapshot)=>{

seatBox.innerHTML = "";

let count = 0;

snapshot.forEach((docx)=>{

let data =
docx.data();

if(data.room !== roomId){
return;
}

count++;

seatBox.innerHTML += `

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
${data.name}
</div>

<div class="status">
🟢 Online
</div>

</div>

`;

});

for(
let i = count;
i < 6;
i++
){

seatBox.innerHTML += `

<div class="empty-seat">

<div class="plus">
+
</div>

<div class="join-text">
Empty Seat
</div>

</div>

`;

}

document.getElementById(
"onlineText"
).innerHTML =
"🟢 " +
count +
" Members Online";

});

/* SEND MSG */

window.sendMsg =
async function(){

let msg =
document.getElementById(
"msg"
).value;

if(msg.trim()==""){
return;
}

await addDoc(
collection(db,"groupComments"),
{
room:roomId,
user:username,
msg:msg,
time:Date.now()
}
);

document.getElementById(
"msg"
).value = "";

}

/* LOAD COMMENTS */

const commentQuery =
query(
collection(db,"groupComments"),
orderBy("time")
);

onSnapshot(
commentQuery,
(snapshot)=>{

let html = "";

snapshot.forEach((docx)=>{

let data =
docx.data();

if(data.room !== roomId){
return;
}

html += `

<div class="comment">
👤 <b>${data.user}</b> :
${data.msg}
</div>

`;

});

document.getElementById(
"commentArea"
).innerHTML =
html;

});

/* EMOJI */

window.addEmoji =
function(){

document.getElementById(
"msg"
).value += " 😊";

}

/* MIC */

let localStream;

let micEnabled = true;

let speakerOn = true;

async function startVoice(){

try{

localStream =
await navigator
.mediaDevices
.getUserMedia({
audio:true
});

}catch(err){

alert(
"Mic Permission Denied"
);

}

}

startVoice();

/* MIC TOGGLE */

window.toggleMic =
function(){

if(!localStream){
return;
}

micEnabled =
!micEnabled;

localStream
.getAudioTracks()[0]
.enabled =
micEnabled;

if(micEnabled){

document.getElementById(
"micBtn"
).innerHTML =
"🎙️";

}else{

document.getElementById(
"micBtn"
).innerHTML =
"🔇";

}

}

/* SPEAKER */

window.toggleSpeaker =
function(){

speakerOn =
!speakerOn;

if(speakerOn){

document.getElementById(
"speakerBtn"
).innerHTML =
"🔊";

}else{

document.getElementById(
"speakerBtn"
).innerHTML =
"🔇";

}

}

</script>

</body>
</html>
