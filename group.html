<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Ultimate Group Room</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
padding-bottom:120px;
}

/* TOPBAR */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.room-info{
display:flex;
flex-direction:column;
}

.room-name{
font-size:20px;
font-weight:bold;
}

.room-online{
font-size:13px;
color:#00ff66;
margin-top:3px;
}

.admin-btn{
background:#0084ff;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
font-size:14px;
cursor:pointer;
}

/* VOICE BUTTONS */

.voice-controls{
position:fixed;
top:90px;
right:15px;
display:flex;
flex-direction:column;
gap:10px;
z-index:9999;
}

.voice-btn{
width:60px;
height:60px;
border:none;
border-radius:50%;
font-size:24px;
color:white;
cursor:pointer;
}

.mic-btn{
background:#0084ff;
}

.speaker-btn{
background:#00aa55;
}

/* SEATS */

.seats{
padding-top:90px;
padding-left:15px;
padding-right:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
position:relative;
cursor:pointer;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.username{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.status{
margin-top:5px;
font-size:14px;
color:#00ff66;
}

.crown{
position:absolute;
top:10px;
right:10px;
font-size:22px;
}

.empty-seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
border:2px dashed #333;
cursor:pointer;
}

.plus{
font-size:40px;
margin-top:15px;
}

.join-text{
margin-top:10px;
font-size:16px;
color:#aaa;
}

/* COMMENTS */

.comment-area{
padding:15px;
margin-bottom:100px;
}

.comment{
background:#111;
padding:12px;
border-radius:15px;
margin-top:10px;
font-size:15px;
}

/* SEND */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
gap:10px;
padding:10px;
align-items:center;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
background:#222;
color:white;
}

.send-btn{
background:#0084ff;
border:none;
padding:14px 18px;
border-radius:15px;
color:white;
font-size:18px;
cursor:pointer;
}

.emoji{
font-size:24px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="room-info">

<div
class="room-name"
id="roomName"
>
🔥 Tamil Room
</div>

<div class="room-online">
🟢 8 Members Online
</div>

</div>

<button class="admin-btn">
Admin
</button>

</div>

<!-- VOICE -->

<div class="voice-controls">

<button
id="micBtn"
class="voice-btn mic-btn"
onclick="toggleMic()"
>
🎤
</button>

<button
id="speakerBtn"
class="voice-btn speaker-btn"
onclick="toggleSpeaker()"
>
🔊
</button>

</div>

<!-- SEATS -->

<div class="seats">

<div class="seat">

<div class="crown">
👑
</div>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Karthi
</div>

<div class="status">
🎤 Speaking
</div>

</div>

<div class="seat">

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Arun
</div>

<div class="status">
🎧 Listening
</div>

</div>

<div class="empty-seat">

<div class="plus">
+
</div>

<div class="join-text">
Join Seat
</div>

</div>

</div>

<!-- COMMENTS -->

<div
class="comment-area"
id="commentArea"
>

<div class="comment">
🔥 Welcome To Room
</div>

</div>

<!-- SEND -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<input
type="text"
id="msg"
placeholder="Write comment..."
>

<button
class="send-btn"
onclick="sendMsg()"
>
➤
</button>

</div>

<script>

/* COMMENT */

function sendMsg(){

let msg =
document.getElementById(
"msg"
).value;

if(msg.trim() == ""){
return;
}

let div =
document.createElement(
"div"
);

div.className =
"comment";

div.innerHTML =
"👤 You : " + msg;

document.getElementById(
"commentArea"
).appendChild(div);

document.getElementById(
"msg"
).value = "";

}

/* EMOJI */

function addEmoji(){

document.getElementById(
"msg"
).value += " 😊";

}

/* REAL VOICE SYSTEM */

let localStream;
let micEnabled = true;
let speakerOn = true;

/* START MIC */

async function startVoice(){

try{

localStream =
await navigator
.mediaDevices
.getUserMedia({
audio:true
});

console.log(
"Voice Connected 🎤"
);

/* START DETECT */

startSpeakingDetect();

}catch(err){

alert(
"Mic Permission Denied ❌"
);

}

}

/* AUTO START */

startVoice();

/* MIC */

window.toggleMic =
function(){

if(!localStream){

startVoice();
return;

}

micEnabled =
!micEnabled;

localStream
.getAudioTracks()[0]
.enabled =
micEnabled;

if(micEnabled){

document.getElementById(
"micBtn"
).innerHTML =
"🎙️";

document.getElementById(
"micBtn"
).style.background =
"#0084ff";

}else{

document.getElementById(
"micBtn"
).innerHTML =
"🔇";

document.getElementById(
"micBtn"
).style.background =
"red";

}

}

/* SPEAKER */

window.toggleSpeaker =
function(){

speakerOn =
!speakerOn;

if(speakerOn){

document.getElementById(
"speakerBtn"
).innerHTML =
"🔊";

document.getElementById(
"speakerBtn"
).style.background =
"#00aa55";

}else{

document.getElementById(
"speakerBtn"
).innerHTML =
"🔇";

document.getElementById(
"speakerBtn"
).style.background =
"red";

}

}

/* SPEAK DETECT */

function startSpeakingDetect(){

const audioContext =
new AudioContext();

const analyser =
audioContext.createAnalyser();

const microphone =
audioContext
.createMediaStreamSource(
localStream
);

microphone.connect(
analyser
);

analyser.fftSize = 256;

const dataArray =
new Uint8Array(
analyser.frequencyBinCount
);

function detectSpeaking(){

analyser.getByteFrequencyData(
dataArray
);

let volume = 0;

for(
let i = 0;
i < dataArray.length;
i++
){

volume += dataArray[i];

}

volume =
volume / dataArray.length;

if(volume > 20){

document.getElementById(
"micBtn"
).style.boxShadow =
"0 0 30px #00ff66";

}else{

document.getElementById(
"micBtn"
).style.boxShadow =
"none";

}

requestAnimationFrame(
detectSpeaking
);

}

detectSpeaking();

}

</script>

</body>
</html>
