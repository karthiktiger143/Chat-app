<!DOCTYPE html>
<html>
<head>

<title>Group Room</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
}

/* TOPBAR */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
position:fixed;
top:0;
left:0;
z-index:1000;
}

.room-info{
display:flex;
flex-direction:column;
}

.room-name{
font-size:20px;
font-weight:bold;
}

.room-online{
font-size:13px;
color:#00ff66;
margin-top:3px;
}

.admin-btn{
background:#0084ff;
border:none;
padding:10px 14px;
border-radius:12px;
color:white;
font-size:14px;
}

/* SEATS */

.seats{
padding-top:90px;
padding-left:15px;
padding-right:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
position:relative;
cursor:pointer;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.username{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.status{
margin-top:5px;
font-size:14px;
color:#00ff66;
}

.crown{
position:absolute;
top:10px;
right:10px;
font-size:22px;
}

/* EMPTY SEAT */

.empty-seat{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
border:2px dashed #333;
cursor:pointer;
}

.plus{
font-size:40px;
margin-top:15px;
}

.join-text{
margin-top:10px;
font-size:16px;
color:#aaa;
}

/* COMMENTS */

.comment-area{
padding:15px;
margin-bottom:100px;
}

.comment{
background:#111;
padding:12px;
border-radius:15px;
margin-top:10px;
font-size:15px;
}

/* SEND BOX */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
gap:10px;
padding:10px;
align-items:center;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
}

.send-btn{
background:#0084ff;
border:none;
padding:14px 18px;
border-radius:15px;
color:white;
font-size:18px;
cursor:pointer;
}

.emoji,
.gift{
font-size:24px;
cursor:pointer;
}

/* PROFILE POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
width:90%;
background:#111;
padding:25px;
border-radius:20px;
text-align:center;
}

.popup-box img{
width:90px;
height:90px;
border-radius:50%;
}

.popup-name{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.popup-btn{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#0084ff;
color:white;
font-size:16px;
cursor:pointer;
}

.close-btn{
background:red;
margin-top:10px;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="room-info">

<div
class="room-name"
id="roomName"
>
🔥 Room
</div>

<div class="room-online">
8 Members Online
</div>

</div>

<button class="admin-btn">
Admin
</button>

</div>

<!-- SEATS -->

<div class="seats">

<div
class="seat"
onclick="openProfile('Karthi')"
>

<div class="crown">
👑
</div>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Karthi
</div>

<div class="status">
🎤 Speaking
</div>

</div>

<div
class="seat"
onclick="openProfile('Arun')"
>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Arun
</div>

<div class="status">
🎧 Listening
</div>

</div>

<div
class="seat"
onclick="openProfile('Hari')"
>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Hari
</div>

<div class="status">
🎧 Listening
</div>

</div>

<div
class="seat"
onclick="openProfile('Vicky')"
>

<img src="https://i.imgur.com/6VBx3io.png">

<div class="username">
Vicky
</div>

<div class="status">
🎤 Speaking
</div>

</div>

<div
class="empty-seat"
onclick="joinSeat()"
>

<div class="plus">
+
</div>

<div class="join-text">
Join Seat
</div>

</div>

<div
class="empty-seat"
onclick="joinSeat()"
>

<div class="plus">
+
</div>

<div class="join-text">
Join Seat
</div>

</div>

</div>

<!-- COMMENTS -->

<div
class="comment-area"
id="commentArea"
>
</div>

<!-- SEND BOX -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<div
class="gift"
onclick="sendGift()"
>
🎁
</div>

<input
type="text"
id="msg"
placeholder="Write comment..."
>

<button
class="send-btn"
onclick="sendMsg()"
>
➤
</button>

</div>

<!-- PROFILE POPUP -->

<div
class="popup"
id="popup"
>

<div class="popup-box">

<img src="https://i.imgur.com/6VBx3io.png">

<div
class="popup-name"
id="popupName"
>
User
</div>

<button
class="popup-btn"
onclick="sendRequest()"
>
Send Message Request
</button>

<button
class="popup-btn"
onclick="followUser()"
>
Follow User
</button>

<button
class="popup-btn close-btn"
onclick="closePopup()"
>
Close
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ROOM NAME */

document.getElementById(
"roomName"
).innerHTML =
"🔥 " +
localStorage.getItem(
"roomName"
) +
" Room";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain:
"nammaapp-e8b13.firebaseapp.com",

projectId:
"nammaapp-e8b13",

storageBucket:
"nammaapp-e8b13.firebasestorage.app",

messagingSenderId:
"1068448599469",

appId:
"1:1068448599469:web:8f02d17e456597de75e524",

measurementId:
"G-ZGL72NLPVS"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* SEND COMMENT */

window.sendMsg =
async function(){

let msg =
document.getElementById(
"msg"
).value;

if(msg.trim() == ""){
return;
}

let user =
localStorage.getItem(
"username"
);

await addDoc(
collection(db,"groupComments"),
{
room:
localStorage.getItem(
"roomName"
),

user:user,

msg:msg,

time:Date.now()
}
);

document.getElementById(
"msg"
).value = "";

}

/* LOAD COMMENTS */

const q =
query(
collection(db,"groupComments"),
orderBy("time")
);

onSnapshot(q,(snapshot)=>{

let html = "";

snapshot.forEach((doc)=>{

let data =
doc.data();

if(
data.room ==
localStorage.getItem(
"roomName"
)
){

html += `

<div class="comment">

<b>${data.user}</b> :
${data.msg}

</div>

`;

}

});

document.getElementById(
"commentArea"
).innerHTML = html;

});

/* ADD EMOJI */

window.addEmoji =
function(){

document.getElementById(
"msg"
).value += " 😊";

}

/* SEND GIFT */

window.sendGift =
function(){

alert(
"Gift Sent 🎁"
);

}

/* JOIN SEAT */

window.joinSeat =
function(){

alert(
"You joined speaker seat 🔥"
);

}

/* PROFILE */

window.openProfile =
function(name){

document.getElementById(
"popup"
).style.display = "flex";

document.getElementById(
"popupName"
).innerHTML = name;

}

window.closePopup =
function(){

document.getElementById(
"popup"
).style.display = "none";

}

window.sendRequest =
function(){

alert(
"Message request sent 🔥"
);

}

window.followUser =
function(){

alert(
"User followed 🔥"
);

}

</script>

</body>
</html>
