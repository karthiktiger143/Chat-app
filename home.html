<!-- home.html -->

<!DOCTYPE html>
<html>
<head>

<title>NammaApp Home</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
}

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.profile{
display:flex;
align-items:center;
gap:12px;
}

.profile img{
width:50px;
height:50px;
border-radius:50%;
}

.username{
font-size:20px;
font-weight:bold;
}

.status{
font-size:13px;
color:#00ff66;
}

.search{
padding:15px;
}

.search input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#111;
color:white;
font-size:16px;
}

.chat-list{
padding:15px;
margin-bottom:90px;
}

.chat-box{
background:#111;
padding:15px;
border-radius:18px;
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-left{
display:flex;
align-items:center;
gap:12px;
}

.chat-left img{
width:55px;
height:55px;
border-radius:50%;
}

.chat-name{
font-size:18px;
font-weight:bold;
}

.chat-msg{
font-size:14px;
color:#aaa;
margin-top:3px;
}

.time{
font-size:12px;
color:#888;
}

.bottom-nav{
width:100%;
height:75px;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
}

.nav{
text-align:center;
font-size:14px;
}

.nav span{
display:block;
font-size:24px;
margin-bottom:4px;
}

.logout-btn{
position:fixed;
top:15px;
right:15px;
background:red;
border:none;
padding:10px 15px;
border-radius:10px;
color:white;
font-size:14px;
}

</style>

</head>

<body>

<button
class="logout-btn"
onclick="logout()"
>
Logout
</button>

<div class="topbar">

<div class="profile">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<div
class="username"
id="username"
>
User
</div>

<div class="status">
Online
</div>

</div>

</div>

<h2>💬</h2>

</div>

<div class="search">

<input
type="text"
placeholder="Search chats..."
>

</div>

<div class="chat-list">

<div class="chat-box">

<div class="chat-left">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<div class="chat-name">
Karthi
</div>

<div class="chat-msg">
Hello 👋
</div>

</div>

</div>

<div class="time">
9:30 PM
</div>

</div>

<div class="chat-box">

<div class="chat-left">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<div class="chat-name">
Arun
</div>

<div class="chat-msg">
Typing...
</div>

</div>

</div>

<div class="time">
8:40 PM
</div>

</div>

</div>

<div class="bottom-nav">

<div class="nav">
<span>💬</span>
Chats
</div>

<div class="nav">
<span>👥</span>
Groups
</div>

<div class="nav">
<span>📞</span>
Calls
</div>

<div class="nav">
<span>⚙️</span>
Settings
</div>

</div>

<script>

const user =
localStorage.getItem("username");

document.getElementById(
"username"
).innerHTML =
user + " Welcome";

function logout(){

localStorage.clear();

window.location.href =
"index.html";

}

</script>

</body>
</html>
