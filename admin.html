<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Ultimate Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
padding-bottom:120px;
}

/* TOPBAR */

.topbar{
width:100%;
padding:15px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
border-bottom:1px solid #222;
z-index:999;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.back{
font-size:24px;
cursor:pointer;
}

.title{
font-size:22px;
font-weight:bold;
}

.admin-badge{
background:#0084ff;
padding:8px 14px;
border-radius:20px;
font-size:14px;
}

/* CONTAINER */

.container{
padding:90px 15px 20px;
}

/* CARD */

.card{
background:#111;
padding:18px;
border-radius:18px;
margin-top:15px;
border:1px solid #222;
}

.card h3{
margin-bottom:15px;
font-size:18px;
}

/* BUTTON */

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
margin-top:10px;
font-size:16px;
font-weight:bold;
color:white;
cursor:pointer;
}

.red{
background:red;
}

.green{
background:#00aa55;
}

.blue{
background:#0084ff;
}

.orange{
background:#ff8800;
}

.purple{
background:#8a2be2;
}

/* INPUT */

.input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#222;
color:white;
margin-top:10px;
font-size:15px;
outline:none;
}

/* USER */

.user{
background:#1a1a1a;
padding:14px;
border-radius:14px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.user-name{
font-size:16px;
font-weight:bold;
}

.user-status{
font-size:13px;
color:#00ff66;
margin-top:5px;
}

.actions{
display:flex;
gap:8px;
}

.action-btn{
padding:10px 12px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:14px;
}

/* LOGS */

.logs{
max-height:250px;
overflow:auto;
}

.log{
background:#1a1a1a;
padding:12px;
border-radius:12px;
margin-top:10px;
font-size:14px;
}

/* SEAT */

.seat{
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-top:12px;
text-align:center;
transition:0.3s;
}

.seat img{
width:70px;
height:70px;
border-radius:50%;
}

.username{
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.status{
margin-top:5px;
color:#00ff66;
font-size:14px;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="left">

<div
class="back"
onclick="history.back()"
>
⬅
</div>

<div class="title">
Admin Panel
</div>

</div>

<div class="admin-badge">
👑 ADMIN
</div>

</div>

<!-- CONTAINER -->

<div class="container">

<!-- ROOM CONTROL -->

<div class="card">

<h3>
🔒 Room Control
</h3>

<button
class="btn blue"
onclick="lockRoom()"
>
🔒 Lock Room
</button>

<button
class="btn green"
onclick="unlockRoom()"
>
🔓 Unlock Room
</button>

<button
class="btn orange"
onclick="pinMessage()"
>
📌 Pin Message
</button>

</div>

<!-- ANNOUNCEMENT -->

<div class="card">

<h3>
📢 Announcement
</h3>

<input
class="input"
id="announceInput"
placeholder="Type announcement..."
>

<button
class="btn blue"
onclick="sendAnnouncement()"
>
📢 Send Announcement
</button>

</div>

<!-- USERS -->

<div class="card">

<h3>
👥 User Management
</h3>

<div id="userList">

<div class="user">

<div>

<div class="user-name">
Karthi
</div>

<div class="user-status">
🟢 Online
</div>

</div>

<div class="actions">

<button
class="action-btn orange"
onclick="muteUser('Karthi')"
>
🔇
</button>

<button
class="action-btn red"
onclick="kickUser('Karthi')"
>
🚫
</button>

</div>

</div>

<div class="user">

<div>

<div class="user-name">
Arun
</div>

<div class="user-status">
🟢 Online
</div>

</div>

<div class="actions">

<button
class="action-btn orange"
onclick="muteUser('Arun')"
>
🔇
</button>

<button
class="action-btn red"
onclick="kickUser('Arun')"
>
🚫
</button>

</div>

</div>

</div>

</div>

<!-- SEAT REQUEST -->

<div class="card">

<h3>
🎤 Seat Requests
</h3>

<div
id="seatRequestBox"
>
</div>

</div>

<!-- LIVE SPEAKERS -->

<div class="card">

<h3>
🎤 Active Speakers
</h3>

<div
id="seatContainer"
>
</div>

</div>

<!-- LOGS -->

<div class="card">

<h3>
🧾 Admin Logs
</h3>

<div
class="logs"
id="adminLogs"
>
</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
setDoc,
doc,
onSnapshot,
query,
orderBy,
deleteDoc,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain:
"nammaapp-e8b13.firebaseapp.com",

projectId:
"nammaapp-e8b13",

storageBucket:
"nammaapp-e8b13.firebasestorage.app",

messagingSenderId:
"1068448599469",

appId:
"1:1068448599469:web:8f02d17e456597de75e524"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ADD LOG */

async function addLog(text){

await addDoc(
collection(db,"adminLogs"),
{
text:text,
time:Date.now()
}
);

}

/* LIVE LOGS */

const logQuery =
query(
collection(db,"adminLogs"),
orderBy("time")
);

onSnapshot(
logQuery,
(snapshot)=>{

let html = "";

snapshot.forEach((docx)=>{

let data =
docx.data();

html += `

<div class="log">
${data.text}
</div>

`;

});

document.getElementById(
"adminLogs"
).innerHTML =
html;

});

/* LOCK */

window.lockRoom =
async function(){

await setDoc(
doc(db,"roomSettings","main"),
{
locked:true
}
);

addLog(
"🔒 Room Locked"
);

alert(
"Room Locked 🔒"
);

}

/* UNLOCK */

window.unlockRoom =
async function(){

await setDoc(
doc(db,"roomSettings","main"),
{
locked:false
}
);

addLog(
"🔓 Room Unlocked"
);

alert(
"Room Unlocked 🔓"
);

}

/* ANNOUNCEMENT */

window.sendAnnouncement =
async function(){

let msg =
document.getElementById(
"announceInput"
).value;

if(msg.trim()==""){
return;
}

await addDoc(
collection(db,"announcements"),
{
msg:msg,
time:Date.now()
}
);

addLog(
"📢 Announcement Sent"
);

alert(
"Announcement Sent 📢"
);

}

/* PIN */

window.pinMessage =
async function(){

let msg =
prompt(
"Enter Pin Message"
);

if(!msg){
return;
}

await addDoc(
collection(db,"pinnedMessages"),
{
msg:msg,
time:Date.now()
}
);

addLog(
"📌 Message Pinned"
);

alert(
"Pinned 📌"
);

}

/* KICK */

window.kickUser =
async function(name){

await addDoc(
collection(db,"kickedUsers"),
{
user:name,
time:Date.now()
}
);

addLog(
"🚫 " + name + " kicked"
);

alert(
name + " kicked 🚫"
);

}

/* MUTE */

window.muteUser =
async function(name){

await addDoc(
collection(db,"mutedUsers"),
{
user:name,
time:Date.now()
}
);

addLog(
"🔇 " + name + " muted"
);

alert(
name + " muted 🔇"
);

}

/* SEAT REQUEST */

const requestQuery =
query(
collection(db,"seatRequests"),
orderBy("time")
);

onSnapshot(
requestQuery,
(snapshot)=>{

let html = "";

snapshot.forEach((docx)=>{

let data =
docx.data();

html += `

<div class="user">

<div>

<div class="user-name">
${data.user}
</div>

<div class="user-status">
✋ Raise Hand
</div>

</div>

<div class="actions">

<button
class="action-btn green"
onclick="approveSeat('${data.user}','${docx.id}')"
>
✅
</button>

<button
class="action-btn red"
onclick="rejectSeat('${docx.id}')"
>
❌
</button>

</div>

</div>

`;

});

document.getElementById(
"seatRequestBox"
).innerHTML =
html;

});

/* APPROVE */

window.approveSeat =
async function(name,id){

await addDoc(
collection(db,"seatApproved"),
{
user:name,
time:Date.now()
}
);

await deleteDoc(
doc(db,"seatRequests",id)
);

addLog(
"✅ " + name + " approved"
);

alert(
name + " approved ✅"
);

}

/* REJECT */

window.rejectSeat =
async function(id){

await deleteDoc(
doc(db,"seatRequests",id)
);

addLog(
"❌ Seat Request Rejected"
);

alert(
"Rejected ❌"
);

}

/* LIVE SPEAKERS */

const seatQuery =
query(
collection(db,"activeSpeakers"),
orderBy("time")
);

onSnapshot(
seatQuery,
(snapshot)=>{

let html = "";

snapshot.forEach((docx)=>{

let data =
docx.data();

html += `

<div
class="seat"
id="seat_${data.user}"
>

<img
src="https://i.imgur.com/6VBx3io.png"
>

<div class="username">
${data.user}
</div>

<div class="status">
🎤 Speaker
</div>

</div>

`;

});

document.getElementById(
"seatContainer"
).innerHTML =
html;

});

/* SPEAKING STATUS */

const voiceQuery =
query(
collection(db,"voiceStatus"),
orderBy("time")
);

onSnapshot(
voiceQuery,
(snapshot)=>{

snapshot.forEach((docx)=>{

let data =
docx.data();

let seat =
document.getElementById(
"seat_" + data.user
);

if(!seat){
return;
}

if(data.speaking){

seat.style.boxShadow =
"0 0 30px #00ff66";

}else{

seat.style.boxShadow =
"none";

}

});

});

</script>

</body>

</html>
