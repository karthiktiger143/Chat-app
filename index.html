<!-- index.html -->

<!DOCTYPE html>
<html>
<head>

<title>NammaApp Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:90%;
max-width:400px;
background:#111;
padding:25px;
border-radius:20px;
}

h1{
color:white;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2196f3;
color:white;
font-size:18px;
}

</style>

</head>

<body>

<div class="box">

<h1>NammaApp</h1>

<input
type="email"
id="email"
placeholder="Enter Email"
>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="registerUser()">
Register
</button>

<button onclick="loginUser()">
Login
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain: "nammaapp-e8b13.firebaseapp.com",

projectId: "nammaapp-e8b13",

storageBucket: "nammaapp-e8b13.firebasestorage.app",

messagingSenderId: "1068448599469",

appId: "1:1068448599469:web:8f02d17e456597de75e524",

measurementId: "G-ZGL72NLPVS"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.registerUser = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

alert("Register Success");

})

.catch((error)=>{

alert(error.message);

});

}

window.loginUser = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

let username =
prompt("Enter User ID");

localStorage.setItem(
"username",
username
);

window.location.href =
"home.html";

})

.catch(()=>{

alert("Incorrect Email or Password");

});

}

</script>

</body>
</html>
