<!DOCTYPE html>
<html>
<head>

<title>NammaApp</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:90%;
max-width:400px;
background:#111;
padding:25px;
border-radius:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#2196f3;
color:white;
font-size:18px;
}

#homePage{
display:none;
text-align:center;
}

.logout{
background:red;
}

</style>

</head>

<body>

<div class="container">

<div id="loginPage">

<h1>NammaApp</h1>

<input
type="email"
id="email"
placeholder="Enter Email"
>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="registerUser()">
Register
</button>

<button onclick="loginUser()">
Login
</button>

</div>

<div id="usernamePage" style="display:none;">

<h1>Create User ID</h1>

<input
type="text"
id="username"
placeholder="Enter User ID"
>

<button onclick="saveUsername()">
Continue
</button>

</div>

<div id="homePage">

<h1 id="welcomeText">
Welcome
</h1>

<br>

<h2 id="showUser">
User
</h2>

<button
class="logout"
onclick="logoutUser()"
>
Logout
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain: "nammaapp-e8b13.firebaseapp.com",

projectId: "nammaapp-e8b13",

storageBucket: "nammaapp-e8b13.firebasestorage.app",

messagingSenderId: "1068448599469",

appId: "1:1068448599469:web:8f02d17e456597de75e524",

measurementId: "G-ZGL72NLPVS"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.registerUser = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

createUserWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

alert("Register Success");

})

.catch((error)=>{

alert(error.message);

});

}

window.loginUser = function(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

signInWithEmailAndPassword(
auth,
email,
password
)

.then(()=>{

document.getElementById(
"loginPage"
).style.display="none";

document.getElementById(
"usernamePage"
).style.display="block";

})

.catch(()=>{

alert("Incorrect Email or Password");

});

}

window.saveUsername = function(){

let username =
document.getElementById("username").value;

localStorage.setItem(
"username",
username
);

document.getElementById(
"usernamePage"
).style.display="none";

document.getElementById(
"homePage"
).style.display="block";

document.getElementById(
"welcomeText"
).innerHTML =
username + " Welcome";

document.getElementById(
"showUser"
).innerHTML =
"User ID : " + username;

}

window.logoutUser = function(){

signOut(auth)

.then(()=>{

location.reload();

});

}

</script>

</body>
</html>
