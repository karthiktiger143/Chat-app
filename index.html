<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NammaApp Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#000;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:90%;
            max-width:400px;
            background:#111;
            padding:30px;
            border-radius:25px;
        }

        h1{
            color:white;
            margin-bottom:25px;
            font-size:40px;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:12px;
            font-size:18px;
            outline:none;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:12px;
            background:#119dff;
            color:white;
            font-size:20px;
            cursor:pointer;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>NammaApp</h1>

        <input type="email" id="email" placeholder="Enter Gmail">

        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>
    </div>

    <script>
        function login(){

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if(email === "test@gmail.com" && password === "123456"){

                alert("Login Success ✅");

                window.location.href = "https://google.com";

            } else {

                alert("Wrong Email or Password ❌");

            }
        }
    </script>

</body>
</html>
