<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>NammaApp</title>

<style>

body{
background:#0f0f0f;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.login-box{
width:320px;
background:#1c1c1c;
padding:25px;
border-radius:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#0099ff;
color:white;
border:none;
border-radius:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h1>NammaApp</h1>

<input type="text"
id="phone"
placeholder="+91 Phone Number">

<div id="recaptcha-container"></div>

<button onclick="sendOTP()">
Send OTP
</button>

<input type="text"
id="otp"
placeholder="Enter OTP">

<button onclick="verifyOTP()">
Verify OTP
</button>

</div>

<script type="module"
src="script.js"></script>

</body>
</html>
