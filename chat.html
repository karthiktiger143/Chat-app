<!DOCTYPE html>
<html>
<head>

<title>Ultimate Chat</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* TOPBAR */

.topbar{
width:100%;
height:70px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:fixed;
top:0;
left:0;
border-bottom:1px solid #222;
z-index:999;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.back{
font-size:24px;
cursor:pointer;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:45px;
height:45px;
border-radius:50%;
}

.name{
font-size:18px;
font-weight:bold;
}

.online{
font-size:12px;
color:#00ff66;
}

.typing{
font-size:12px;
color:#ffaa00;
}

.top-icons{
display:flex;
gap:15px;
font-size:22px;
}

/* PINNED */

.pinned{
margin-top:70px;
background:#111;
padding:12px;
font-size:14px;
border-bottom:1px solid #222;
}

/* CHAT */

.chat-area{
height:100vh;
overflow-y:auto;
padding:15px;
padding-top:130px;
padding-bottom:120px;
}

.msg{
max-width:75%;
padding:12px;
margin-top:12px;
border-radius:18px;
position:relative;
word-wrap:break-word;
}

.my-msg{
background:#0084ff;
margin-left:auto;
}

.other-msg{
background:#1a1a1a;
}

.msg img{
width:100%;
border-radius:12px;
margin-top:10px;
}

.audio-player{
margin-top:10px;
width:100%;
}

.msg-time{
font-size:10px;
margin-top:5px;
text-align:right;
}

.seen{
font-size:11px;
margin-top:4px;
text-align:right;
color:#aaffaa;
}

.react{
margin-top:8px;
font-size:18px;
display:flex;
gap:10px;
}

/* SEND */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
background:#222;
color:white;
font-size:16px;
outline:none;
}

.send-btn{
padding:14px 18px;
border:none;
border-radius:15px;
background:#0084ff;
color:white;
font-size:18px;
cursor:pointer;
}

.icon{
font-size:24px;
cursor:pointer;
}

#imageInput,
#audioInput{
display:none;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="left">

<div
class="back"
onclick="window.history.back()"
>
⬅
</div>

<div class="profile">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<div
class="name"
id="chatName"
>
Chat
</div>

<div class="online">
🟢 Online
</div>

<div
class="typing"
id="typingStatus"
>
</div>

</div>

</div>

</div>

<div class="top-icons">
📞 🎥
</div>

</div>

<!-- PINNED -->

<div class="pinned">
📌 Welcome to private chat 🔥
</div>

<!-- CHAT -->

<div
class="chat-area"
id="chatArea"
>
</div>

<!-- SEND -->

<div class="send-box">

<div
class="icon"
onclick="addEmoji()"
>
😊
</div>

<div
class="icon"
onclick="pickImage()"
>
📷
</div>

<div
class="icon"
onclick="pickAudio()"
>
🎤
</div>

<input
type="file"
id="imageInput"
accept="image/*"
onchange="uploadImage(event)"
>

<input
type="file"
id="audioInput"
accept="audio/*"
onchange="uploadAudio(event)"
>

<input
type="text"
id="msg"
placeholder="Type message..."
oninput="showTyping()"
>

<button
class="send-btn"
onclick="sendMsg()"
>
➤
</button>

</div>

<script type="module">

import {
initializeApp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
deleteDoc,
doc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey:
"YOUR_API_KEY",

authDomain:
"YOUR_AUTH_DOMAIN",

projectId:
"YOUR_PROJECT_ID",

storageBucket:
"YOUR_STORAGE_BUCKET",

messagingSenderId:
"YOUR_SENDER_ID",

appId:
"YOUR_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* USERS */

const currentUser =
localStorage.getItem(
"username"
)
||
"Guest";

const targetUser =
localStorage.getItem(
"profileUser"
)
||
"Friend";

document.getElementById(
"chatName"
).innerHTML =
targetUser;

/* SEND TEXT */

window.sendMsg =
async function(){

let text =
document.getElementById(
"msg"
).value;

if(text.trim() == ""){
return;
}

await addDoc(
collection(db,"messages"),
{
name:currentUser,
target:targetUser,
msg:text,
type:"text",
time:Date.now()
}
);

document.getElementById(
"msg"
).value = "";

}

/* LOAD */

const q =
query(
collection(db,"messages"),
orderBy("time")
);

onSnapshot(q,(snapshot)=>{

let html = "";

snapshot.forEach((d)=>{

let data =
d.data();

if(
(
data.name === currentUser &&
data.target === targetUser
)
||
(
data.name === targetUser &&
data.target === currentUser
)
){

let cls =
data.name === currentUser
? "my-msg"
: "other-msg";

html += `

<div class="msg ${cls}">

<b>${data.name}</b>

<br><br>

${data.msg || ""}

${
data.image
?
`<img src="${data.image}">`
:
""
}

${
data.audio
?
`
<audio
controls
class="audio-player"
>
<source
src="${data.audio}"
type="audio/mp3"
>
</audio>
`
:
""
}

<div class="react">
❤️ 😂 🔥
</div>

<div class="msg-time">
Now
</div>

<div class="seen">
✓✓ Seen
</div>

<div
style="
margin-top:8px;
font-size:12px;
color:#ff6666;
cursor:pointer;
"
onclick="deleteMessage('${d.id}')"
>
Delete
</div>

</div>

`;

}

});

document.getElementById(
"chatArea"
).innerHTML =
html;

scrollBottom();

});

/* DELETE */

window.deleteMessage =
async function(id){

await deleteDoc(
doc(db,"messages",id)
);

}

/* IMAGE */

window.pickImage =
function(){

document.getElementById(
"imageInput"
).click();

}

window.uploadImage =
function(event){

let file =
event.target.files[0];

let reader =
new FileReader();

reader.onload =
async function(e){

await addDoc(
collection(db,"messages"),
{
name:currentUser,
target:targetUser,
image:e.target.result,
type:"image",
time:Date.now()
}
);

};

reader.readAsDataURL(file);

}

/* AUDIO */

window.pickAudio =
function(){

document.getElementById(
"audioInput"
).click();

}

window.uploadAudio =
function(event){

let file =
event.target.files[0];

let reader =
new FileReader();

reader.onload =
async function(e){

await addDoc(
collection(db,"messages"),
{
name:currentUser,
target:targetUser,
audio:e.target.result,
type:"audio",
time:Date.now()
}
);

};

reader.readAsDataURL(file);

}

/* EMOJI */

window.addEmoji =
function(){

document.getElementById(
"msg"
).value += " 😊";

}

/* TYPING */

let typingTimer;

window.showTyping =
function(){

document.getElementById(
"typingStatus"
).innerHTML =
currentUser +
" typing...";

clearTimeout(
typingTimer
);

typingTimer =
setTimeout(()=>{

document.getElementById(
"typingStatus"
).innerHTML = "";

},1500);

}

/* AUTO SCROLL */

function scrollBottom(){

let chat =
document.getElementById(
"chatArea"
);

chat.scrollTop =
chat.scrollHeight;

}

</script>

</body>
</html>
