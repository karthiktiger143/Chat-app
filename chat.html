<!DOCTYPE html>
<html>
<head>

<title>NammaApp Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* TOPBAR */

.topbar{
width:100%;
height:70px;
background:#111;
display:flex;
align-items:center;
padding:15px;
gap:15px;
position:fixed;
top:0;
left:0;
border-bottom:1px solid #222;
z-index:1000;
}

.back{
font-size:25px;
cursor:pointer;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:45px;
height:45px;
border-radius:50%;
}

.name{
font-size:18px;
font-weight:bold;
}

.online{
font-size:12px;
color:#00ff66;
}

.typing{
font-size:12px;
color:#ffaa00;
margin-top:2px;
}

/* CHAT AREA */

.chat-area{
padding:100px 15px 110px;
height:100vh;
overflow-y:auto;
}

/* MY MESSAGE */

.my-msg{
background:#0084ff;
padding:12px 15px;
border-radius:15px;
margin-top:12px;
margin-left:auto;
width:fit-content;
max-width:75%;
word-wrap:break-word;
}

/* OTHER MESSAGE */

.other-msg{
background:#1a1a1a;
padding:12px 15px;
border-radius:15px;
margin-top:12px;
width:fit-content;
max-width:75%;
word-wrap:break-word;
}

.time{
font-size:10px;
color:#ddd;
margin-top:5px;
text-align:right;
}

/* SEND BOX */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
align-items:center;
gap:10px;
padding:10px;
border-top:1px solid #222;
}

.emoji{
font-size:24px;
cursor:pointer;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
}

.send-box button{
padding:14px 18px;
border:none;
border-radius:15px;
background:#0084ff;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div
class="back"
onclick="window.location.href='home.html'"
>
⬅
</div>

<div class="profile">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<div class="name">
NammaApp Chat
</div>

<div class="online">
Online
</div>

<div
class="typing"
id="typingStatus"
>
</div>

</div>

</div>

</div>

<!-- CHAT AREA -->

<div
class="chat-area"
id="chatArea"
>
</div>

<!-- SEND BOX -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<input
type="text"
id="msg"
placeholder="Type message..."
oninput="showTyping()"
>

<button onclick="sendMsg()">
➤
</button>

</div>

<!-- FIREBASE -->

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:
"AIzaSyCM2CUrWEyad180qCy-34PC4A0HOLaSWsg",

authDomain:
"nammaapp-e8b13.firebaseapp.com",

projectId:
"nammaapp-e8b13",

storageBucket:
"nammaapp-e8b13.firebasestorage.app",

messagingSenderId:
"1068448599469",

appId:
"1:1068448599469:web:8f02d17e456597de75e524",

measurementId:
"G-ZGL72NLPVS"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* USER */

const currentUser =
localStorage.getItem("username");

/* SEND MESSAGE */

window.sendMsg =
async function(){

let text =
document.getElementById("msg").value;

if(text.trim() == ""){
return;
}

await addDoc(
collection(db,"messages"),
{

name: currentUser,

msg: text,

time: Date.now()

}
);

document.getElementById(
"msg"
).value = "";

document.getElementById(
"typingStatus"
).innerHTML = "";

};

/* LOAD MESSAGES */

const q =
query(
collection(db,"messages"),
orderBy("time")
);

onSnapshot(q,(snapshot)=>{

let html = "";

snapshot.forEach((doc)=>{

let data =
doc.data();

let msgClass =
data.name === currentUser
? "my-msg"
: "other-msg";

html += `

<div class="${msgClass}">

<b>${data.name}</b>

<br><br>

${data.msg}

<div class="time">
Now
</div>

</div>

`;

});

document.getElementById(
"chatArea"
).innerHTML = html;

scrollBottom();

});

/* EMOJI */

window.addEmoji =
function(){

document.getElementById(
"msg"
).value += "😊";

}

/* TYPING */

let typingTimer;

window.showTyping =
function(){

document.getElementById(
"typingStatus"
).innerHTML =
currentUser + " is typing...";

clearTimeout(typingTimer);

typingTimer =
setTimeout(()=>{

document.getElementById(
"typingStatus"
).innerHTML = "";

},1500);

}

/* AUTO SCROLL */

function scrollBottom(){

let chat =
document.getElementById(
"chatArea"
);

chat.scrollTop =
chat.scrollHeight;

}

</script>

</body>
</html>
