<!DOCTYPE html>
<html>
<head>

<title>NammaApp Chat</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* TOPBAR */

.topbar{
width:100%;
height:70px;
background:#111;
display:flex;
align-items:center;
padding:15px;
gap:15px;
position:fixed;
top:0;
left:0;
border-bottom:1px solid #222;
z-index:1000;
}

.back{
font-size:25px;
cursor:pointer;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:45px;
height:45px;
border-radius:50%;
}

.name{
font-size:18px;
font-weight:bold;
}

.online{
font-size:12px;
color:#00ff66;
}

/* CHAT AREA */

.chat-area{
padding:85px 15px 120px;
height:100vh;
overflow-y:auto;
}

/* LEFT MESSAGE */

.left-msg{
background:#1b1b1b;
padding:12px 15px;
border-radius:15px;
margin-top:12px;
width:fit-content;
max-width:75%;
}

/* RIGHT MESSAGE */

.right-msg{
background:#0084ff;
padding:12px 15px;
border-radius:15px;
margin-top:12px;
margin-left:auto;
width:fit-content;
max-width:75%;
}

.time{
font-size:10px;
color:#ccc;
margin-top:5px;
text-align:right;
}

/* SEND BOX */

.send-box{
width:100%;
background:#111;
position:fixed;
bottom:0;
left:0;
display:flex;
align-items:center;
padding:10px;
gap:10px;
border-top:1px solid #222;
}

.send-box input{
flex:1;
padding:15px;
border:none;
border-radius:15px;
outline:none;
font-size:16px;
}

.send-box button{
padding:14px 18px;
border:none;
border-radius:15px;
background:#0084ff;
color:white;
font-size:18px;
}

/* EMOJI */

.emoji{
font-size:25px;
cursor:pointer;
}

/* IMAGE BTN */

.image-btn{
font-size:22px;
cursor:pointer;
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div
class="back"
onclick="goBack()"
>
⬅
</div>

<div class="profile">

<img src="https://i.imgur.com/6VBx3io.png">

<div>

<div class="name">
Karthi
</div>

<div class="online">
Online
</div>

</div>

</div>

</div>

<!-- CHAT AREA -->

<div
class="chat-area"
id="chatArea"
>

<div class="left-msg">
Hello 👋
<div class="time">
9:20 PM
</div>
</div>

<div class="right-msg">
Hi Bro 😎
<div class="time">
9:21 PM
</div>
</div>

</div>

<!-- SEND BOX -->

<div class="send-box">

<div
class="emoji"
onclick="addEmoji()"
>
😊
</div>

<div class="image-btn">
📷
</div>

<input
type="text"
id="msg"
placeholder="Type message..."
>

<button onclick="sendMsg()">
➤
</button>

</div>

<script>

/* SEND MESSAGE */

function sendMsg(){

let text =
document.getElementById("msg").value;

if(text.trim() === ""){
return;
}

let div =
document.createElement("div");

div.className =
"right-msg";

div.innerHTML =

text +

'<div class="time">Now</div>';

document.getElementById(
"chatArea"
).appendChild(div);

document.getElementById(
"msg"
).value = "";

scrollBottom();

}

/* EMOJI */

function addEmoji(){

document.getElementById(
"msg"
).value += "😊";

}

/* BACK */

function goBack(){

window.location.href =
"home.html";

}

/* AUTO SCROLL */

function scrollBottom(){

let chat =
document.getElementById(
"chatArea"
);

chat.scrollTop =
chat.scrollHeight;

}

</script>

</body>
</html>
