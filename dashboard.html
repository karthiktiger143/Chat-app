<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<style>

body{
    margin:0;
    padding:0;
    background:black;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:320px;
    background:#111;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(255,255,255,0.1);
}

h1{
    margin-bottom:20px;
}

h2{
    color:#00ff99;
    margin-bottom:30px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2196f3;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="card">

    <h1>Welcome ✅</h1>

    <h2 id="number"></h2>

    <button onclick="logout()">Logout</button>

</div>

<script>

document.getElementById("number").innerText =
localStorage.getItem("userNumber");

function logout(){

    localStorage.removeItem("userNumber");

    window.location.href = "index.html";
}

</script>

</body>
</html>
